<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Design - SD Android</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #F5F5F5;
        }
        .phone-frame {
            max-width: 375px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .screen {
            padding: 24px;
            background: white;
            min-height: 667px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .illustration {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin-bottom: 48px;
        }
        h1 {
            font-size: 28px;
            font-weight: bold;
            color: #212121;
            margin: 0 0 16px 0;
            line-height: 1.3;
        }
        .description {
            font-size: 16px;
            color: #757575;
            line-height: 1.5;
            margin-bottom: 48px;
            max-width: 300px;
        }
        .button-container {
            width: 100%;
            margin-top: auto;
        }
        .button {
            width: 100%;
            height: 56px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
            transition: all 0.2s;
        }
        .button:hover {
            background: #1976D2;
            box-shadow: 0 6px 16px rgba(33, 150, 243, 0.4);
        }
        .button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="screen">
            <div class="illustration">📱</div>
            
            <h1>Manage Your Subscriptions</h1>
            
            <p class="description">
                Track and manage all your subscriptions in one place. 
                Get insights into your spending and never miss a payment.
            </p>
            
            <div class="button-container">
                <button class="button">Get Started</button>
            </div>
        </div>
    </div>
</body>
</html>
