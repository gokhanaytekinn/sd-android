<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1383ec",
                        "background-light": "#ffffff",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark text-[#0d151b] dark:text-slate-50 min-h-screen flex flex-col">
<!-- Top Navigation -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between sticky top-0 z-10">
<div class="text-[#0d151b] dark:text-slate-50 flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors cursor-pointer">
<span class="material-symbols-outlined">chevron_left</span>
</div>
<h2 class="text-[#0d151b] dark:text-slate-50 text-sm font-semibold leading-tight tracking-tight flex-1 text-center pr-10">Abonelik Dedektifi</h2>
</header>
<main class="flex-1 w-full max-w-[480px] mx-auto px-6 pt-8 pb-12 flex flex-col">
<!-- App Logo/Icon Representation -->
<div class="mb-8 flex justify-start">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl">search_insights</span>
</div>
</div>
<!-- Headline -->
<div class="mb-10">
<h1 class="text-[#0d151b] dark:text-slate-50 tracking-tight text-[32px] font-bold leading-tight">Giriş Yap</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-base">Aboneliklerini takip etmeye ve tasarruf etmeye hemen başla.</p>
</div>
<!-- Form Fields -->
<div class="space-y-4">
<div class="flex flex-col">
<p class="text-[#0d151b] dark:text-slate-200 text-sm font-medium leading-normal pb-2">E-posta</p>
<input class="form-input flex w-full rounded-lg text-[#0d151b] dark:text-slate-50 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#cfdce7] dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] text-base font-normal" placeholder="eposta@ornek.com" type="email"/>
</div>
<div class="flex flex-col">
<p class="text-[#0d151b] dark:text-slate-200 text-sm font-medium leading-normal pb-2">Şifre</p>
<div class="relative flex items-stretch">
<input class="form-input flex w-full rounded-lg text-[#0d151b] dark:text-slate-50 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#cfdce7] dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] pr-12 text-base font-normal" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-0 h-full px-4 text-slate-400 hover:text-primary transition-colors focus:outline-none">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex justify-end mt-2">
<a class="text-primary text-sm font-medium hover:underline" href="#">Şifremi Unuttum?</a>
</div>
</div>
</div>
<!-- Main Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl mt-8 shadow-md shadow-primary/20 transition-all active:scale-[0.98]">
            Giriş Yap
        </button>
<!-- Social Login Divider -->
<div class="relative flex py-8 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-slate-400 text-sm font-medium">veya</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<!-- Social Login Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 rounded-xl h-14 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB5gEF_5f2Y0-X-1oqQzCLVj9fhPTfJyD9Xd9EaQxRs8XPzBJ9KMzxF4zWRE72voDHePJW2CQSmXrRm8aOjvmkfSj3QvSYB2QWQ4jTfQBo7SKEy_ZXa_ZzhdKM1hEnMAfobVK5z3S1C2BI4nIuAiLOwYt_Y6HR8NC3o6zn3lEvmKn8FAowc8jjz-BrIv3t-F3z4hGk9sgLNorL3d3XejsuDLMi24JeTKDEFHZct9vx9z3T7UmiDj4V9AxpKMEgl0a5ilNBcWUqjfzSZ"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 rounded-xl h-14 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">ios</span>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
<!-- Sign Up Link -->
<div class="mt-auto pt-10 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Hesabın yok mu? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Kayıt Ol</a>
</p>
</div>
</main>
<!-- App Decorative Background (Subtle) -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl -mr-32 -mt-32"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-primary/5 rounded-full blur-3xl -ml-48 -mb-48"></div>
</body></html>
