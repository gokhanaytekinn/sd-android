<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Abonelik Dedektifi - Kayıt Ol</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1383ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="flex h-screen w-full flex-col bg-white dark:bg-background-dark max-w-md mx-auto shadow-2xl relative overflow-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-[#111518] dark:text-white flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-[#111518] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Abonelik Dedektifi</h2>
</div>
<div class="flex-1 overflow-y-auto px-4">
<!-- HeadlineText -->
<div class="pt-6 pb-2">
<h1 class="text-[#111518] dark:text-white tracking-tight text-[32px] font-bold leading-tight text-left">Hesap Oluştur</h1>
</div>
<!-- BodyText -->
<div class="pb-6 pt-1">
<p class="text-[#617689] dark:text-gray-400 text-base font-normal leading-normal">Aboneliklerini yönetmeye ve tasarruf etmeye başla.</p>
</div>
<!-- Form Section -->
<form class="space-y-4">
<!-- Name Field -->
<div class="flex flex-col w-full">
<p class="text-[#111518] dark:text-white text-sm font-medium leading-normal pb-2">Ad Soyad</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111518] dark:text-white border border-[#dbe1e6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-[#617689] p-[15px] text-base font-normal" placeholder="Örn: Ahmet Yılmaz" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col w-full">
<p class="text-[#111518] dark:text-white text-sm font-medium leading-normal pb-2">E-posta</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111518] dark:text-white border border-[#dbe1e6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-[#617689] p-[15px] text-base font-normal" placeholder="örnek@mail.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col w-full">
<p class="text-[#111518] dark:text-white text-sm font-medium leading-normal pb-2">Şifre</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111518] dark:text-white border border-[#dbe1e6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-[#617689] p-[15px] text-base font-normal" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-[#617689] cursor-pointer">visibility</span>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 py-4">
<div class="flex items-center h-5">
<input class="h-5 w-5 rounded border-gray-300 text-primary focus:ring-primary" type="checkbox"/>
</div>
<div class="text-sm leading-5">
<label class="text-[#617689] dark:text-gray-400">
<span class="text-primary font-medium underline">Kullanım Koşullarını</span> ve <span class="text-primary font-medium underline">Gizlilik Politikası</span>'nı kabul ediyorum.
                        </label>
</div>
</div>
</form>
</div>
<!-- Sticky Footer Action -->
<div class="p-4 bg-white dark:bg-background-dark border-t border-gray-100 dark:border-gray-800">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] w-full mb-4">
<span class="truncate">Kayıt Ol</span>
</button>
<div class="text-center">
<p class="text-sm text-[#617689] dark:text-gray-400">
                    Zaten bir hesabın var mı? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Giriş Yap</a>
</p>
</div>
<div class="h-6"></div> <!-- Safe area for iOS home indicator -->
</div>
<!-- Decorative background elements -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/2 -left-24 w-48 h-48 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
