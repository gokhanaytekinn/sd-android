<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yardım Merkezi - Abonelik Dedektifi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0676e0",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Main Wrapper -->
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-slate-900 shadow-xl overflow-x-hidden">
<!-- Header -->
<div class="flex items-center px-4 pt-6 pb-4 justify-between sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-10">
<button class="text-slate-600 dark:text-slate-400 hover:text-primary transition-colors flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-10">Yardım Merkezi</h1>
</div>
<!-- Search Section -->
<div class="px-4 py-4">
<div class="group relative flex flex-col w-full">
<div class="flex w-full items-center rounded-xl bg-slate-100 dark:bg-slate-800 border-2 border-transparent focus-within:border-primary/30 transition-all duration-200">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 pl-4">search</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 py-3.5 px-3 text-base font-normal leading-normal" placeholder="Nasıl yardımcı olabiliriz?" type="text"/>
</div>
</div>
</div>
<!-- FAQ Categories Grid -->

<!-- Popular Questions -->
<div class="px-4 py-6">
<div class="flex items-center justify-between mb-4">
<h3 class="text-slate-900 dark:text-white text-lg font-bold">Popüler Sorular</h3>

</div>
<div class="space-y-3">
<div class="flex items-center justify-between p-4 rounded-xl bg-slate-50 dark:bg-slate-800/30 border border-slate-100 dark:border-slate-800 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="text-slate-800 dark:text-slate-200 text-sm font-medium">Abonelik nasıl iptal edilir?</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
<div class="flex items-center justify-between p-4 rounded-xl bg-slate-50 dark:bg-slate-800/30 border border-slate-100 dark:border-slate-800 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="text-slate-800 dark:text-slate-200 text-sm font-medium">Verilerim güvende mi?</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
<div class="flex items-center justify-between p-4 rounded-xl bg-slate-50 dark:bg-slate-800/30 border border-slate-100 dark:border-slate-800 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="text-slate-800 dark:text-slate-200 text-sm font-medium">Banka hesabımı nasıl bağlarım?</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
</div>
</div>
<!-- Support Section -->

<!-- Bottom Navigation Bar -->

</div>
</body></html>
