<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Abonelik Dedektifi - Şifremi Unuttum</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1978e5", "background-light": "#f6f7f8", "background-dark": "#111821"}, fontFamily: {display: "Inter"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col transition-colors duration-300">
<!-- Top Navigation -->
<header class="flex items-center justify-between p-4 max-w-xl mx-auto w-full">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="w-10"></div> <!-- Spacer to center title if needed, or keep for balance -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pt-12 pb-8 max-w-xl mx-auto w-full">
<!-- Context Icon -->
<div class="mb-8 flex justify-start">
<div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">lock_reset</span>
</div>
</div>
<!-- Typography Section -->
<div class="mb-10">
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-3 tracking-tight">
                Şifremi Unuttum
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed">
                Şifrenizi sıfırlamak için kayıtlı e-posta adresinizi girin. Size bir doğrulama kodu göndereceğiz.
            </p>
</div>
<!-- Input Section -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">
                    E-posta Adresi
                </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500" id="email" name="email" placeholder="e-posta@ornek.com" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg shadow-primary/20 active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Kod Gönder</span>
<span class="material-symbols-outlined text-xl">send</span>
</button>
</div>
</form>
<!-- Footer Help -->
<div class="mt-auto pt-10 text-center">
<p class="text-sm text-slate-500 dark:text-slate-500">
                Sorun mu yaşıyorsunuz? <a class="text-primary font-semibold hover:underline" href="#">Destek ekibiyle iletişime geçin</a>
</p>
</div>
</main>
<!-- Decorative Element (Optional subtle background shape) -->
<div class="fixed -bottom-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
