<!DOCTYPE html>

<html class="light dark" lang="tr"><head>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1383ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",

                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col bg-white dark:bg-background-dark max-w-[430px] mx-auto overflow-hidden">
<!-- Header / Progress Area -->
<div class="flex w-full flex-row items-center justify-center gap-3 pt-12 pb-6">
<div class="h-1.5 w-12 rounded-full bg-[#dbe1e6] dark:bg-gray-700"></div>
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
<div class="h-1.5 w-12 rounded-full bg-[#dbe1e6] dark:bg-gray-700"></div>
</div>
<!-- Main Content Area -->
<div class="flex flex-col flex-1 px-6 justify-center">
<!-- Illustration Component -->
<div class="flex w-full @container mb-12">
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Decorative background shapes -->
<div class="absolute inset-0 bg-primary/5 rounded-full scale-90 blur-3xl"></div>
<!-- Minimalist Illustration Simulation -->
<div class="relative z-10 w-full h-full flex items-center justify-center">
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6 border border-gray-100 dark:border-gray-700 w-64 relative overflow-hidden">
<!-- Scanning line effect -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary/40"></div>
<div class="flex items-center gap-3 mb-4">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">notifications_active</span>
</div>
<div class="flex-1">
<div class="h-2 w-20 bg-gray-200 dark:bg-gray-600 rounded mb-1"></div>
<div class="h-2 w-12 bg-gray-100 dark:bg-gray-700 rounded"></div>
</div>
</div>
<div class="space-y-3">
<div class="flex items-center gap-3 p-2 bg-background-light dark:bg-gray-900 rounded-lg">
<span class="material-symbols-outlined text-green-500 text-sm">check_circle</span>
<div class="h-2 w-24 bg-gray-200 dark:bg-gray-600 rounded"></div>
</div>
<div class="flex items-center gap-3 p-2 bg-background-light dark:bg-gray-900 rounded-lg opacity-60">
<span class="material-symbols-outlined text-gray-400 text-sm">sms</span>
<div class="h-2 w-32 bg-gray-200 dark:bg-gray-600 rounded"></div>
</div>
</div>
<!-- Shield Badge -->
<div class="absolute -bottom-2 -right-2 bg-primary text-white p-3 rounded-full shadow-lg">
<span class="material-symbols-outlined text-[20px]">verified_user</span>
</div>
</div>
</div>
</div>
</div>

<h1 class="text-[#111518] dark:text-white tracking-tight text-[28px] font-bold leading-tight text-center pb-3">
                Ödemelerini Otomatik Yakalar
            </h1>
<!-- Body Text -->
<p class="text-[#617689] dark:text-gray-400 text-base font-normal leading-relaxed text-center px-4">
                SMS ve bildirimlerini tarayarak aboneliklerini saniyeler içinde listeler.
            </p>
</div>
<!-- Footer / Action Area -->
<div class="p-6 pb-10 flex flex-col items-center gap-4">

<div class="flex items-center justify-center gap-1.5 py-2">
<span class="material-symbols-outlined text-sm text-[#617689]">lock</span>
<p class="text-[#617689] dark:text-gray-500 text-xs font-medium uppercase tracking-wider">Uçtan uca şifreli ve güvenli</p>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl text-lg transition-colors shadow-lg shadow-primary/20">
                Devam Et
            </button>
<!-- Safe Area Bottom Spacer (iOS style) -->
<div class="h-2"></div>
</div>
