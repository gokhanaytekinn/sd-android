<input class="form-input flex w-full rounded-lg text-[#111518] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dbe1e6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#617689] p-[15px] text-base font-normal leading-normal" placeholder="0.00" step="0.01" type="number"/>

<span class="truncate">Aylık</span>
<input checked="" class="invisible w-0" name="cycle" type="radio" value="monthly"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-gray-700 has-[:checked]:shadow-sm has-[:checked]:text-[#111518] dark:has-[:checked]:text-white text-[#617689] text-sm font-semibold transition-all">
<span class="truncate">Yıllık</span>
<input class="invisible w-0" name="cycle" type="radio" value="yearly"/>
</label>
</div>
</div>

<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">calendar_today</span>
</div>
</label>
</div>

<span class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform transform translate-x-6"></span>
</div>
</div>
</div>

<div class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
